<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admission Field Prediction System</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Admission Field Prediction System</h1>
      <p class="subtitle">Enter your rank, category, and quota to predict the admission field.</p>

      <form id="prediction-form">
        <label>
          Rank
          <input type="number" id="rank" placeholder="Enter rank" required>
        </label>

        <label>
          Category
          <select id="category">
            <option value="">Auto</option>
            <option value="OPEN">OPEN</option>
            <option value="SC">SC</option>
            <option value="ST">ST</option>
            <option value="SEBC">SEBC</option>
            <option value="EWS">EWS</option>
            <option value="TFWS">TFWS</option>
          </select>
        </label>

        <label>
          Quota
          <select id="quota">
            <option value="">Auto</option>
            <option value="D2D">D2D</option>
            <option value="GUJCET">GUJCET</option>
          </select>
        </label>

        <button type="submit">Predict</button>
      </form>

      <div class="result-box">
        <h2>Prediction Result</h2>
        <p id="result">No prediction yet.</p>
      </div>

      <section class="search-panel">
        <h2>Institute Search</h2>
        <p class="subtitle">Filter institutes and see hostel availability plus the official website.</p>

        <form id="filter-form">
          <label>
            City
            <select id="filter-city">
              <option value="">All Cities</option>
            </select>
          </label>

          <label>
            Branch
            <select id="filter-branch">
              <option value="">All Branches</option>
            </select>
          </label>

          <label>
            Institute
            <select id="filter-institute">
              <option value="">All Institutes</option>
            </select>
          </label>

          <label>
            Hostel Available
            <select id="filter-hostel">
              <option value="">All</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </label>

          <button type="submit">Search Institutes</button>
        </form>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Institute</th>
                <th>Branch</th>
                <th>City</th>
                <th>Hostel</th>
                <th>Website</th>
              </tr>
            </thead>
            <tbody id="filter-results">
              <tr><td colspan="5">No results yet.</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script src="/script.js"></script>
</body>
</html>
