<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admission Field Prediction System</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Admission Field Prediction System</h1>
      <p class="subtitle">Enter your rank, category, and quota to predict the admission field.</p>

      <form id="prediction-form">
        <label>
          Rank
          <input type="number" id="rank" placeholder="Enter rank" required>
        </label>

        <label>
          Category
          <select id="category">
            <option value="OPEN">OPEN</option>
            <option value="SC">SC</option>
            <option value="ST">ST</option>
            <option value="SEBC">SEBC</option>
            <option value="EWS">EWS</option>
            <option value="TFWS">TFWS</option>
          </select>
        </label>

        <label>
          Quota
          <select id="quota">
            <option value="D2D">D2D</option>
            <option value="GUJCET">GUJCET</option>
          </select>
        </label>

        <button type="submit">Predict</button>
      </form>

      <div class="result-box">
        <h2>Prediction Result</h2>
        <p id="result">No prediction yet.</p>
      </div>
    </section>
  </main>

  <script src="/script.js"></script>
</body>
</html>
